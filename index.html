<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>Viral Video Hub</title>

  <!-- CSS -->

  <link rel="stylesheet"
  href="css/style.css">

  <!-- Google Font -->

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">

</head>

<body>

  <!-- Header -->

  <header class="header">

    <div class="logo">
      🔥 Viral Hub

  </section>

  <!-- Video Cards -->

  <section class="container">

    <!-- Card 1 -->

    <div class="card"
    onclick="openCPA('https://your-cpa-link.com')">

      <div class="image-box">

        <img src="https://picsum.photos/600/400?1"
        alt="video">

        <div class="overlay"></div>

        <div class="play-btn">
          ▶
        </div>

      </div>

      <div class="content">

        <h3>
          Amazing Viral Video
        </h3>

        <span>
          Watch Now
        </span>

      </div>

    </div>

    <!-- Card 2 -->

    <div class="card"
    onclick="openCPA('https://your-cpa-link.com')">

      <div class="image-box">

        <img src="https://picsum.photos/600/400?2"
        alt="video">

        <div class="overlay"></div>

        <div class="play-btn">
          ▶
        </div>

      </div>

      <div class="content">

        <h3>
          Trending Funny Clip
        </h3>

        <span>
          Play Video
        </span>

      </div>

    </div>

    <!-- Card 3 -->

    <div class="card"
    onclick="openCPA('https://your-cpa-link.com')">

      <div class="image-box">

        <img src="https://picsum.photos/600/400?3"
        alt="video">

        <div class="overlay"></div>

        <div class="play-btn">
          ▶
        </div>

      </div>

        <h3>
          Secret Trending Video

        <span>
          Watch Full Video
        </span>

      </div>

    </div>

    <!-- Card 4 -->

    <div class="card"
    onclick="openCPA('https://your-cpa-link.com')">

      <div class="image-box">

        <img src="https://picsum.photos/600/400?4"
        alt="video">

        <div class="play-btn">
          ▶
        </div>

      </div>

      <div class="content">

        <h3>
          Top Viral Moments
        </h3>

        <span>
          Watch Online
        </span>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer class="footer">

    <p>
      © 2026 Viral Hub
    </p>

  </footer>

  <!-- JS -->

  <script src="js/script.js"></script>

</body>
</html>
